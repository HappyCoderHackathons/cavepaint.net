<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cavepaint Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cave0: "#160f0a",
            cave1: "#2a1d13",
            clay: "#9e6b3d",
            chalk: "#f1e4cf",
            ember: "#e56a2e",
          },
          fontFamily: {
            display: ["Cinzel", "serif"],
            body: ["Manrope", "ui-sans-serif", "system-ui"],
          },
          boxShadow: {
            cave: "0 18px 60px rgba(0,0,0,0.45)",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen overflow-x-clip bg-cave0 font-body text-chalk">
  <div class="pointer-events-none fixed inset-0 opacity-25" style="background:radial-gradient(circle at 12% 18%, rgba(229,106,46,0.38), transparent 38%),radial-gradient(circle at 84% 12%, rgba(158,107,61,0.26), transparent 40%),radial-gradient(circle at 50% 100%, rgba(255,236,204,0.09), transparent 35%);"></div>
  <img id="caveBackgroundOverlay" 
    src="/static/images/cave_wall.jpg"
    alt=""
    class="pointer-events-none fixed inset-0 z-0 h-[calc(100%-10px)] w-full translate-y-[-10px] object-cover opacity-[0.18]"
    draggable="false"
  >
  <main class="relative z-10 mx-auto flex min-h-screen w-full max-w-7xl flex-col gap-5 p-4 sm:gap-6 sm:p-6 overflow-visible">
    <section class="pointer-events-none relative z-50 flex items-start justify-between">
      <div class="relative">
        <h1 class="font-display text-4xl leading-tight text-orange-100 drop-shadow-[0_2px_8px_rgba(0,0,0,0.65)] sm:text-6xl">
          Cavepaint.net
        </h1>
        <a
          href="/gallery"
          class="pointer-events-auto absolute left-0 top-full mt-1 inline-flex items-center text-xs font-semibold uppercase tracking-widest text-orange-100/60 transition hover:text-chalk sm:text-sm"
        >
          Open Gallery
          <span aria-hidden="true" class="ml-1">&rarr;</span>
        </a>
      </div>
      <img
        id="cavemanBackground"
        src="/static/images/cave_man_2.png"
        alt="Caveman art"
        class="relative z-[60] h-28 w-28 object-contain drop-shadow-[0_10px_28px_rgba(0,0,0,0.55)] sm:h-40 sm:w-40"
        draggable="false"
      >
    </section>

    <section class="relative min-h-0 flex-1 overflow-visible">
      <div
  aria-hidden="true"
  class="pointer-events-none absolute inset-y-0 left-1/2 z-[1] w-screen -translate-x-1/2 bg-black/70"
></div>
      <video
        id="video"
        autoplay
        playsinline
        muted
        class="relative z-[5] h-full w-full object-contain"
      ></video>
      <div class="pointer-events-none absolute inset-y-0 left-1/2 z-10 w-screen -translate-x-1/2 -translate-y-[10px]">
        <img
          id="caveFrameOverlay"
          src="/static/images/cave.png"
          alt=""
          class="absolute left-1/2 top-1/2 h-[140%] w-[300%] -translate-x-1/2 -translate-y-1/2 object-fill"
          style="
            filter: brightness(0.52) saturate(0.8);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 14%, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 14%, black 88%, transparent 100%);
          "
          draggable="false"
        >
        <div
          aria-hidden="true"
          class="absolute left-1/2 top-1/2 h-[140%] w-[300%] -translate-x-1/2 -translate-y-1/2 bg-[#73411d] opacity-[0.22] mix-blend-multiply"
          style="
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 14%, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 14%, black 88%, transparent 100%);
          "
        ></div>
      </div>
      <div id="trackingHud" class="pointer-events-none absolute right-3 top-3 z-30 font-mono text-xs leading-5 text-stone-200 drop-shadow-[0_2px_8px_rgba(0,0,0,0.85)]">
        <div id="hudCam">CAM  — / —</div>
        <div id="hudTip0">TIP0 —</div>
        <div id="hudTip1">TIP1 —</div>
        <div id="hudXyz">XYZ  —</div>
        <div id="hudHand">HAND —</div>
        <div id="hudBrush">BRUSH —</div>
        <div id="hudFps">FPS  —</div>
      </div>
      <div id="swipeOverlay" class="pointer-events-none absolute inset-0 z-30 flex items-center justify-center">
        <div id="swipeLabel" class="text-2xl font-bold tracking-widest uppercase transition-opacity duration-100" style="opacity:0;text-shadow:0 2px 8px #000a"></div>
      </div>
    </section>

    <section class="relative z-[70] px-1 py-2">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <span class="shrink-0 text-sm uppercase tracking-[0.2em] text-orange-100/90">Palette</span>
          <div id="paletteSwatches" class="flex flex-wrap gap-3"></div>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs uppercase tracking-[0.16em] text-orange-100/70">Stone Tools</span>
        <button
          id="undoBtn"
          class="rounded-full border border-stone-200/25 bg-gradient-to-b from-[#9b8f7f] via-[#746a5d] to-[#4a433b] px-5 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-amber-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.28),0_6px_16px_rgba(0,0,0,0.38)] transition hover:brightness-110 active:translate-y-px sm:text-base"
        >
          Undo
        </button>
        <button
          id="clearBtn"
          class="rounded-full border border-orange-100/20 bg-gradient-to-b from-[#8c6f61] via-[#684f45] to-[#42302a] px-5 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-orange-50 shadow-[inset_0_1px_0_rgba(255,255,255,0.2),0_6px_16px_rgba(0,0,0,0.42)] transition hover:brightness-110 active:translate-y-px sm:text-base"
        >
          Clear
        </button>
          <span class="text-xs uppercase tracking-[0.16em] text-orange-100/70 ml-2">Camera</span>
          <button
            id="rotateLeftBtn"
            class="rounded-full border border-stone-200/25 bg-gradient-to-b from-[#5a6f7f] via-[#3d5466] to-[#283845] px-4 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-sky-100 shadow-[inset_0_1px_0_rgba(255,255,255,0.18),0_6px_16px_rgba(0,0,0,0.38)] transition hover:brightness-110 active:translate-y-px disabled:opacity-40 sm:text-base"
            title="Rotate camera left"
          >← Left</button>
          <input
            id="rotateDegreesInput"
            type="number"
            value="90"
            min="1"
            max="360"
            class="w-16 rounded-full border border-stone-200/20 bg-stone-800/60 px-3 py-3 text-center text-sm text-chalk focus:outline-none"
            title="Degrees to rotate"
          >
          <button
            id="rotateRightBtn"
            class="rounded-full border border-stone-200/25 bg-gradient-to-b from-[#5a6f7f] via-[#3d5466] to-[#283845] px-4 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-sky-100 shadow-[inset_0_1px_0_rgba(255,255,255,0.18),0_6px_16px_rgba(0,0,0,0.38)] transition hover:brightness-110 active:translate-y-px disabled:opacity-40 sm:text-base"
            title="Rotate camera right"
          >Right →</button>
        </div>
      </div>
    </section>

    <section class="pt-1">
      <div class="mb-3">
        <div class="w-full">
          <h2 class="font-display text-lg text-chalk sm:text-xl">Whiteboard Viewer</h2>
          <div class="mt-1 flex flex-wrap items-center justify-between gap-2">
            <p id="boardHint" class="text-xs text-orange-100/85 sm:text-sm">Drag left/right to rotate view.</p>
            <div class="flex items-center gap-2">
              <button
                id="drawModeBtn"
                class="rounded-full border border-stone-200/25 bg-gradient-to-b from-[#5a6f4a] via-[#3d5436] to-[#283820] px-4 py-2 text-xs font-semibold uppercase tracking-[0.12em] text-green-100 shadow-[inset_0_1px_0_rgba(255,255,255,0.18),0_4px_12px_rgba(0,0,0,0.38)] transition hover:brightness-110 active:translate-y-px"
              >Draw</button>
              <div id="yawReadout" class="shrink-0 px-2 py-1 text-sm font-semibold text-chalk sm:text-base">
                Yaw 0.0°
              </div>
            </div>
          </div>
        </div>
      </div>

      <div
        id="boardSurface"
        class="relative h-[30vh] min-h-[190px] w-full select-none overflow-hidden bg-white/95 shadow-cave"
      >
        <img
          id="whiteboardImg"
          alt="Projected whiteboard drawing"
          class="h-full w-full object-fill"
          draggable="false"
        >
        <canvas
          id="drawCanvas"
          class="pointer-events-none absolute inset-0 h-full w-full"
          style="display:none"
        ></canvas>
        <div class="pointer-events-none absolute inset-x-0 top-0 h-10 bg-gradient-to-b from-black/10 to-transparent"></div>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const whiteboardImg = document.getElementById("whiteboardImg");
    const boardSurface = document.getElementById("boardSurface");

    const yawReadout = document.getElementById("yawReadout");

    const undoBtn = document.getElementById("undoBtn");
    const clearBtn = document.getElementById("clearBtn");

    const normalize360 = (value) => {
      const wrapped = value % 360;
      return wrapped < 0 ? wrapped + 360 : wrapped;
    };

    let yaw = 0.0;
    const fov = 120.0;  // wide FOV to show panoramic 180° canvas
    let dragging = false;
    let dragStartX = 0;
    let dragStartYaw = 0;
    let boardBusy = false;
    let boardDirty = true;
    let lastObjectUrl = null;
    let liveYawSyncTimer = null;
    let liveYawPending = null;
    let lastLiveYawSent = null;

    function angularDistanceDeg(a, b) {
      return Math.abs(((a - b + 540) % 360) - 180);
    }

    function scheduleLiveYawSync() {
      liveYawPending = normalize360(yaw);
      if (liveYawSyncTimer) return;
      liveYawSyncTimer = setTimeout(async () => {
        liveYawSyncTimer = null;
        const yawToSend = liveYawPending;
        liveYawPending = null;
        if (yawToSend == null) return;
        if (lastLiveYawSent != null && angularDistanceDeg(yawToSend, lastLiveYawSent) < 0.15) return;
        try {
          await fetch("/live_view", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaw: yawToSend, fov }),
          });
          lastLiveYawSent = yawToSend;
        } catch (_) {
          // Ignore temporary sync failures; next drag/update retries.
        }
      }, 80);
    }

    function syncLabels() {
      yawReadout.textContent = `View ${normalize360(yaw).toFixed(1)}°`;
      scheduleLiveYawSync();
    }

    function markBoardDirty() {
      boardDirty = true;
    }

    async function refreshWhiteboard() {
      if (boardBusy) {
        boardDirty = true;
        return;
      }
      if (!boardDirty) return;
      boardBusy = true;
      boardDirty = false;

      try {
        const rect = boardSurface.getBoundingClientRect();
        const width = Math.max(320, Math.round(rect.width));
        const height = Math.max(120, Math.round(rect.height));

        const yawForRequest = normalize360(yaw);
        const url = `/whiteboard.jpg?yaw=${yawForRequest.toFixed(2)}&fov=${fov.toFixed(1)}&w=${width}&h=${height}&t=${Date.now()}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) return;
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        whiteboardImg.src = objectUrl;
        if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);
        lastObjectUrl = objectUrl;
      } catch (_) {
        // Keep UI responsive even if one whiteboard request fails.
      } finally {
        boardBusy = false;
      }
    }

    async function postAction(path) {
      try {
        await fetch(path, { method: "POST" });
      } finally {
        markBoardDirty();
      }
    }

    undoBtn.addEventListener("click", () => postAction("/undo"));
    clearBtn.addEventListener("click", () => postAction("/clear"));

    const rotateLeftBtn = document.getElementById("rotateLeftBtn");
    const rotateRightBtn = document.getElementById("rotateRightBtn");
    const rotateDegreesInput = document.getElementById("rotateDegreesInput");

    async function rotate(direction) {
      const degrees = parseFloat(rotateDegreesInput.value) || 90;
      rotateLeftBtn.disabled = true;
      rotateRightBtn.disabled = true;
      try {
        await fetch("/api/rotate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ degrees: direction * degrees }),
        });
      } finally {
        // re-enable after a short delay so motor has time to finish
        setTimeout(() => {
          rotateLeftBtn.disabled = false;
          rotateRightBtn.disabled = false;
        }, Math.abs(degrees) / 360 * 3000 + 500);
      }
    }

    rotateLeftBtn.addEventListener("click", () => rotate(-1));
    rotateRightBtn.addEventListener("click", () => rotate(1));

    // -----------------------------------------------------------------------
    // Auto-center: proportional controller — small angles, timer-driven
    // -----------------------------------------------------------------------
    const FRAME_WIDTH    = 640;
    const CENTER_X       = FRAME_WIDTH / 2;
    const DEAD_ZONE_PX   = 40;   // px from center that counts as "at rest"
    const MAX_DEG_TICK   = 2.0;  // max degrees sent per tick (full-offset hand)
    const TICK_MS        = 150;  // controller interval

    let autoCenterEnabled = false;
    let motorBusy = false;
    let motorBusyTimer = null;
    let lastHandX = null;

    const autoCenterBtn = document.createElement("button");
    autoCenterBtn.id = "autoCenterBtn";
    autoCenterBtn.textContent = "Auto-Center: OFF";
    autoCenterBtn.className = "rounded-full border border-stone-200/25 bg-gradient-to-b from-[#4a7f5a] via-[#345c3d] to-[#1e3a26] px-4 py-3 text-sm font-semibold uppercase tracking-[0.12em] text-green-100 shadow-[inset_0_1px_0_rgba(255,255,255,0.18),0_6px_16px_rgba(0,0,0,0.38)] transition hover:brightness-110 active:translate-y-px sm:text-base opacity-50";
    rotateRightBtn.after(autoCenterBtn);

    autoCenterBtn.addEventListener("click", () => {
      autoCenterEnabled = !autoCenterEnabled;
      autoCenterBtn.textContent = `Auto-Center: ${autoCenterEnabled ? "ON" : "OFF"}`;
      autoCenterBtn.style.opacity = autoCenterEnabled ? "1" : "0.5";
    });

    setInterval(() => {
      if (!autoCenterEnabled || motorBusy || lastHandX == null) return;
      const offset = lastHandX - CENTER_X;
      const absOffset = Math.abs(offset);
      if (absOffset <= DEAD_ZONE_PX) return;

      // Linear ramp from 0 at dead-zone edge to MAX_DEG_TICK at frame edge
      const t = Math.min((absOffset - DEAD_ZONE_PX) / (CENTER_X - DEAD_ZONE_PX), 1.0);
      const deg = Math.sign(offset) * t * MAX_DEG_TICK;

      motorBusy = true;
      // Estimate how long this small rotation takes, release lock after that
      if (motorBusyTimer) clearTimeout(motorBusyTimer);
      motorBusyTimer = setTimeout(() => { motorBusy = false; }, Math.abs(deg) / 360 * 3000 + 80);

      fetch("/api/rotate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ degrees: deg }),
      }).then(r => r.json()).then(res => {
        if (res.error) { clearTimeout(motorBusyTimer); motorBusy = false; }
      }).catch(() => { clearTimeout(motorBusyTimer); motorBusy = false; });
    }, TICK_MS);

    // Hook into applyState to pick up hand position + theta
    const _origApplyState = applyState;
    applyState = function(data) {
      _origApplyState(data);
      if (data.theta != null) { window._theta = data.theta; syncLabels(); }
      const tip = (data.tracking || {}).tip0;
      if (tip) lastHandX = tip[0];
    };

    // -----------------------------------------------------------------------
    // Draw mode
    // -----------------------------------------------------------------------
    const drawModeBtn = document.getElementById("drawModeBtn");
    const drawCanvas = document.getElementById("drawCanvas");
    const boardHint = document.getElementById("boardHint");
    let drawMode = false;
    let drawing = false;
    let currentStroke = [];

    function setDrawMode(on) {
      drawMode = on;
      drawModeBtn.textContent = on ? "View" : "Draw";
      boardHint.textContent = on
        ? "Click and drag to draw on the whiteboard."
        : "Drag left/right to rotate view.";
      boardSurface.style.cursor = on ? "crosshair" : "";
      drawCanvas.style.display = on ? "block" : "none";
      if (!on) clearDrawCanvas();
    }

    drawModeBtn.addEventListener("click", () => setDrawMode(!drawMode));

    function resizeDrawCanvas() {
      const rect = boardSurface.getBoundingClientRect();
      drawCanvas.width = rect.width;
      drawCanvas.height = rect.height;
    }
    window.addEventListener("resize", () => { resizeDrawCanvas(); markBoardDirty(); });
    resizeDrawCanvas();

    function clearDrawCanvas() {
      const ctx = drawCanvas.getContext("2d");
      ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
    }

    function unprojectPoint(u, v, yaw_deg, fov_deg, W, H) {
      const yaw_rad = yaw_deg * Math.PI / 180;
      const fov_rad = fov_deg * Math.PI / 180;
      const focal = (W / 2) / Math.tan(fov_rad / 2);
      const c = Math.cos(yaw_rad), s = Math.sin(yaw_rad);
      const kx = (u - W / 2) / focal;
      const ky = (v - H / 2) / focal;
      const denom = c + kx * s;
      if (Math.abs(denom) < 1e-6) return null;
      const xw = 400 * (kx * c - s) / denom;
      const zr = -s * xw + c * 400;
      const yw = ky * zr;
      return { x: xw + 320, y: yw + 240, z: 0 };
    }

    function getActiveColor() {
      if (palette.length > 0) {
        return palette[activeColorIdx] || "#000";
      }
      return "#000";
    }

    boardSurface.addEventListener("pointerdown", (event) => {
      if (drawMode) {
        drawing = true;
        currentStroke = [];
        resizeDrawCanvas();
        const rect = boardSurface.getBoundingClientRect();
        const u = event.clientX - rect.left;
        const v = event.clientY - rect.top;
        const pt = unprojectPoint(u, v, normalize360(yaw), fov, rect.width, rect.height);
        if (pt) currentStroke.push({ screenPt: [u, v], worldPt: pt });
        boardSurface.setPointerCapture(event.pointerId);
      } else {
        dragging = true;
        dragStartX = event.clientX;
        dragStartYaw = yaw;
        boardSurface.setPointerCapture(event.pointerId);
      }
    });

    boardSurface.addEventListener("pointermove", (event) => {
      if (drawMode) {
        if (!drawing) return;
        const rect = boardSurface.getBoundingClientRect();
        const u = event.clientX - rect.left;
        const v = event.clientY - rect.top;
        const pt = unprojectPoint(u, v, normalize360(yaw), fov, rect.width, rect.height);
        if (pt) {
          currentStroke.push({ screenPt: [u, v], worldPt: pt });
          // Draw preview on canvas
          const ctx = drawCanvas.getContext("2d");
          ctx.strokeStyle = getActiveColor();
          ctx.lineWidth = 4;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          if (currentStroke.length >= 2) {
            const prev = currentStroke[currentStroke.length - 2].screenPt;
            const cur = currentStroke[currentStroke.length - 1].screenPt;
            ctx.beginPath();
            ctx.moveTo(prev[0], prev[1]);
            ctx.lineTo(cur[0], cur[1]);
            ctx.stroke();
          }
        }
      } else {
        if (!dragging) return;
        const deltaX = event.clientX - dragStartX;
        yaw = normalize360(dragStartYaw + deltaX * 0.22);
        syncLabels();
        markBoardDirty();
      }
    });

    async function commitStroke() {
      if (currentStroke.length < 2) { currentStroke = []; clearDrawCanvas(); return; }
      const points = currentStroke.map(s => s.worldPt);
      currentStroke = [];
      clearDrawCanvas();
      try {
        await fetch("/stroke", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ points, color_idx: activeColorIdx }),
        });
      } finally {
        markBoardDirty();
        refreshWhiteboard();
      }
    }

    function stopInteraction(event) {
      if (drawMode) {
        if (drawing) {
          drawing = false;
          if (typeof event.pointerId === "number") boardSurface.releasePointerCapture(event.pointerId);
          commitStroke();
        }
      } else {
        if (dragging) {
          dragging = false;
          if (typeof event.pointerId === "number") boardSurface.releasePointerCapture(event.pointerId);
        }
      }
    }

    boardSurface.addEventListener("pointerup", stopInteraction);
    boardSurface.addEventListener("pointercancel", stopInteraction);
    boardSurface.addEventListener("lostpointercapture", () => {
      dragging = false;
      if (drawing) { drawing = false; commitStroke(); }
    });

    // Fallback poll — covers initial load and SSE reconnect gaps
    setInterval(() => {
      if (document.hidden) return;
      refreshWhiteboard();
    }, 2000);

    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    pc.ontrack = (event) => {
      video.srcObject = event.streams[0];
    };

    pc.addTransceiver("video", { direction: "recvonly" });

    async function startWebRTC() {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      await new Promise((resolve) => {
        if (pc.iceGatheringState === "complete") {
          resolve();
          return;
        }
        const onStateChange = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", onStateChange);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", onStateChange);
      });

      const response = await fetch("/offer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type
        })
      });

      const answer = await response.json();
      await pc.setRemoteDescription(answer);
    }

    syncLabels();
    markBoardDirty();
    refreshWhiteboard();
    startWebRTC().catch((err) => {
      console.error("WebRTC start failed:", err);
    });

    // -----------------------------------------------------------------------
    // Color palette + swipe state
    // -----------------------------------------------------------------------
    const paletteSwatches = document.getElementById("paletteSwatches");
    const swipeLabel = document.getElementById("swipeLabel");
    const hudCam  = document.getElementById("hudCam");
    const hudTip0 = document.getElementById("hudTip0");
    const hudTip1 = document.getElementById("hudTip1");
    const hudXyz  = document.getElementById("hudXyz");
    const hudHand  = document.getElementById("hudHand");
    const hudBrush = document.getElementById("hudBrush");
    const hudFps   = document.getElementById("hudFps");

    let palette = [];
    let activeColorIdx = 0;
    let swipeFadeTimer = null;

    function renderPalette() {
      paletteSwatches.innerHTML = "";
      palette.forEach((hex, i) => {
        const btn = document.createElement("button");
        btn.style.backgroundColor = hex;
        btn.style.width = "38px";
        btn.style.height = "38px";
        btn.style.borderRadius = "9px";
        btn.style.border = i === activeColorIdx
          ? "3px solid #fff"
          : "2px solid rgba(255,255,255,0.2)";
        btn.style.transition = "filter 120ms ease, box-shadow 120ms ease, transform 120ms ease";
        btn.style.filter = "brightness(1) saturate(1)";
        btn.style.boxShadow = i === activeColorIdx
          ? "0 0 0 2px rgba(255,255,255,0.2), 0 6px 14px rgba(0,0,0,0.35)"
          : "0 4px 10px rgba(0,0,0,0.3)";
        btn.style.cursor = "pointer";
        btn.title = hex;
        btn.addEventListener("mouseenter", () => {
          btn.style.filter = "brightness(1.35) saturate(1.25)";
          btn.style.boxShadow = "0 0 0 2px rgba(255,240,210,0.45), 0 8px 18px rgba(0,0,0,0.45)";
          btn.style.transform = "translateY(-1px)";
        });
        btn.addEventListener("mouseleave", () => {
          btn.style.filter = "brightness(1) saturate(1)";
          btn.style.boxShadow = i === activeColorIdx
            ? "0 0 0 2px rgba(255,255,255,0.2), 0 6px 14px rgba(0,0,0,0.35)"
            : "0 4px 10px rgba(0,0,0,0.3)";
          btn.style.transform = "translateY(0)";
        });
        btn.addEventListener("click", () => {
          fetch("/color", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idx: i }),
          });
          activeColorIdx = i;
          renderPalette();
        });
        paletteSwatches.appendChild(btn);
      });
    }

    function showSwipeLabel(label, color) {
      swipeLabel.textContent = label.replace("_", " ");
      swipeLabel.style.color = color;
      swipeLabel.style.opacity = "1";
      if (swipeFadeTimer) clearTimeout(swipeFadeTimer);
      swipeFadeTimer = setTimeout(() => {
        swipeLabel.style.opacity = "0";
      }, 800);
    }

    let lastSwipeLabel = "";
    let lastCanvasVersion = -1;

    function applyState(data) {
      if (data.palette) palette = data.palette;

      const needsRender = data.color_idx !== activeColorIdx || !paletteSwatches.children.length;
      if (data.color_idx !== undefined) activeColorIdx = data.color_idx;
      if (needsRender) renderPalette();

      const cv = data.canvas_version ?? -1;
      if (cv !== lastCanvasVersion) {
        lastCanvasVersion = cv;
        markBoardDirty();
        refreshWhiteboard();
      }

      const t = data.tracking || {};
      const fmt = (v) => v != null ? v.toFixed(1) : "—";
      const fmtPx = (arr) => arr ? `${arr[0]},${arr[1]}` : "—";
      const fmtXyz = (arr) => arr ? `${fmt(arr[0])} ${fmt(arr[1])} ${fmt(arr[2])}` : "—";
      hudCam.textContent  = `CAM  ${t.cam0 ?? "—"} / ${t.cam1 ?? "—"}`;
      hudTip0.textContent = `TIP0 ${fmtPx(t.tip0)}`;
      hudTip1.textContent = `TIP1 ${fmtPx(t.tip1)}`;
      hudXyz.textContent  = `XYZ  ${fmtXyz(t.pos3d)} in`;
      hudHand.textContent  = `HAND  ${t.gesture ?? "—"}`;
      hudBrush.textContent = `BRUSH ${t.brush_radius ?? "—"}px`;
      hudFps.textContent   = `FPS   ${t.fps ?? "—"}`;

      if (data.swipe_events && data.swipe_events.length) {
        const top = data.swipe_events[data.swipe_events.length - 1];
        const lbl = top.label;
        if (lbl !== lastSwipeLabel && top.frames > 20) {
          lastSwipeLabel = lbl;
          const hex = palette[top.color_idx] || "#fff";
          showSwipeLabel(lbl, hex);
        }
      } else {
        lastSwipeLabel = "";
      }
    }

    function connectStream() {
      const es = new EventSource("/stream");
      es.onmessage = (e) => {
        try { applyState(JSON.parse(e.data)); } catch (_) {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectStream, 1000);
      };
    }
    connectStream();
  </script>
</body>
</html>
