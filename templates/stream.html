<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cavepaint Stream</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#0f172a",
            slate: "#1f2937",
            panel: "#111827",
            accent: "#22c55e",
          },
          fontFamily: {
            display: ["Sora", "ui-sans-serif", "system-ui"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-screen overflow-hidden bg-ink text-slate-100 font-display">
  <main class="mx-auto flex h-full max-w-7xl flex-col gap-3 p-3 sm:gap-4 sm:p-4">
    <section class="relative min-h-0 flex-1 overflow-hidden rounded-2xl border border-white/10 bg-panel shadow-xl">
      <video
        id="video"
        autoplay
        playsinline
        muted
        class="h-full w-full object-contain bg-black"
      ></video>
      <div class="pointer-events-none absolute inset-x-0 top-0 h-20 bg-gradient-to-b from-black/50 to-transparent"></div>
      <div class="absolute left-3 top-3 rounded-md bg-black/40 px-2 py-1 text-xs sm:text-sm">
        Live Stereo Feed
      </div>
      <div id="trackingHud" class="pointer-events-none absolute right-3 top-3 rounded-md bg-black/50 px-3 py-2 font-mono text-xs leading-5 text-slate-200">
        <div id="hudCam">CAM  — / —</div>
        <div id="hudTip0">TIP0 —</div>
        <div id="hudTip1">TIP1 —</div>
        <div id="hudXyz">XYZ  —</div>
        <div id="hudHand">HAND —</div>
        <div id="hudBrush">BRUSH —</div>
        <div id="hudFps">FPS  —</div>
      </div>
      <div id="swipeOverlay" class="pointer-events-none absolute inset-0 flex items-center justify-center">
        <div id="swipeLabel" class="text-2xl font-bold tracking-widest uppercase transition-opacity duration-100" style="opacity:0;text-shadow:0 2px 8px #000a"></div>
      </div>
    </section>

    <section class="flex items-center gap-3 rounded-2xl border border-white/10 bg-panel px-4 py-3 shadow-xl">
      <span class="shrink-0 text-xs uppercase tracking-wide text-slate-300">Color</span>
      <div id="paletteSwatches" class="flex flex-wrap gap-2"></div>
    </section>

    <section class="rounded-2xl border border-white/10 bg-slate p-3 shadow-xl sm:p-4">
      <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
        <div>
          <h1 class="text-sm font-semibold sm:text-base">Whiteboard Viewer</h1>
          <p class="text-xs text-slate-300 sm:text-sm">Drag left/right on the board to rotate view and clip by FOV.</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button id="undoBtn" class="rounded-lg bg-amber-500 px-3 py-2 text-xs font-semibold text-black transition hover:bg-amber-400 sm:text-sm">
            Undo
          </button>
          <button id="clearBtn" class="rounded-lg bg-rose-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-rose-500 sm:text-sm">
            Clear
          </button>
        </div>
      </div>

      <div class="mb-3 grid gap-3 sm:grid-cols-3">
        <label class="rounded-lg bg-black/20 p-2">
          <div class="mb-1 text-xs uppercase tracking-wide text-slate-300">Yaw (deg)</div>
          <input id="yawRange" type="range" min="-85" max="85" step="0.1" value="0" class="w-full">
          <div id="yawValue" class="mt-1 text-xs font-semibold text-accent">0.0</div>
        </label>
        <label class="rounded-lg bg-black/20 p-2">
          <div class="mb-1 text-xs uppercase tracking-wide text-slate-300">FOV (deg)</div>
          <input id="fovRange" type="range" min="30" max="150" step="1" value="80" class="w-full">
          <div id="fovValue" class="mt-1 text-xs font-semibold text-accent">80</div>
        </label>
        <div class="rounded-lg bg-black/20 p-2">
          <div class="mb-1 text-xs uppercase tracking-wide text-slate-300">Board Interaction</div>
          <button id="resetViewBtn" class="rounded-md bg-zinc-200 px-3 py-1 text-xs font-semibold text-zinc-900 transition hover:bg-white">
            Reset View
          </button>
          <p class="mt-2 text-xs text-slate-300">Click and drag horizontally to rotate camera yaw.</p>
        </div>
      </div>

      <div
        id="boardSurface"
        class="relative h-[30vh] min-h-[180px] w-full select-none overflow-hidden rounded-xl border border-white/20 bg-white"
      >
        <img
          id="whiteboardImg"
          alt="Projected whiteboard drawing"
          class="h-full w-full object-fill"
          draggable="false"
        >
        <div class="pointer-events-none absolute inset-x-0 top-0 h-10 bg-gradient-to-b from-black/10 to-transparent"></div>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const whiteboardImg = document.getElementById("whiteboardImg");
    const boardSurface = document.getElementById("boardSurface");

    const yawRange = document.getElementById("yawRange");
    const fovRange = document.getElementById("fovRange");
    const yawValue = document.getElementById("yawValue");
    const fovValue = document.getElementById("fovValue");

    const undoBtn = document.getElementById("undoBtn");
    const clearBtn = document.getElementById("clearBtn");
    const resetViewBtn = document.getElementById("resetViewBtn");

    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

    let yaw = 0.0;
    let fov = 80.0;
    let dragging = false;
    let dragStartX = 0;
    let dragStartYaw = 0;
    let boardBusy = false;
    let boardDirty = true;
    let lastObjectUrl = null;

    function syncLabels() {
      yawRange.value = yaw.toFixed(1);
      fovRange.value = Math.round(fov).toString();
      yawValue.textContent = yaw.toFixed(1);
      fovValue.textContent = Math.round(fov).toString();
    }

    function markBoardDirty() {
      boardDirty = true;
    }

    async function refreshWhiteboard() {
      if (boardBusy) {
        boardDirty = true;
        return;
      }
      if (!boardDirty) return;
      boardBusy = true;
      boardDirty = false;

      try {
        const rect = boardSurface.getBoundingClientRect();
        const width = Math.max(320, Math.round(rect.width));
        const height = Math.max(120, Math.round(rect.height));

        const url = `/whiteboard.png?yaw=${yaw.toFixed(2)}&fov=${fov.toFixed(1)}&w=${width}&h=${height}&t=${Date.now()}`;
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) return;
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        whiteboardImg.src = objectUrl;
        if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);
        lastObjectUrl = objectUrl;
      } catch (_) {
        // Keep UI responsive even if one whiteboard request fails.
      } finally {
        boardBusy = false;
      }
    }

    async function postAction(path) {
      try {
        await fetch(path, { method: "POST" });
      } finally {
        markBoardDirty();
      }
    }

    yawRange.addEventListener("input", () => {
      yaw = clamp(Number(yawRange.value) || 0, -85, 85);
      syncLabels();
      markBoardDirty();
    });

    fovRange.addEventListener("input", () => {
      fov = clamp(Number(fovRange.value) || 80, 30, 150);
      syncLabels();
      markBoardDirty();
    });

    resetViewBtn.addEventListener("click", () => {
      yaw = 0;
      fov = 80;
      syncLabels();
      markBoardDirty();
    });

    undoBtn.addEventListener("click", () => postAction("/undo"));
    clearBtn.addEventListener("click", () => postAction("/clear"));

    boardSurface.addEventListener("pointerdown", (event) => {
      dragging = true;
      dragStartX = event.clientX;
      dragStartYaw = yaw;
      boardSurface.setPointerCapture(event.pointerId);
    });

    boardSurface.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const deltaX = event.clientX - dragStartX;
      yaw = clamp(dragStartYaw + deltaX * 0.22, -85, 85);
      syncLabels();
      markBoardDirty();
    });

    function stopDrag(event) {
      if (dragging) {
        dragging = false;
        if (typeof event.pointerId === "number") {
          boardSurface.releasePointerCapture(event.pointerId);
        }
      }
    }

    boardSurface.addEventListener("pointerup", stopDrag);
    boardSurface.addEventListener("pointercancel", stopDrag);
    boardSurface.addEventListener("lostpointercapture", () => {
      dragging = false;
    });

    window.addEventListener("resize", markBoardDirty);

    const WHITEBOARD_REFRESH_MS = 180;

    setInterval(() => {
      if (document.hidden) return;
      boardDirty = true;
      refreshWhiteboard();
    }, WHITEBOARD_REFRESH_MS);

    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    pc.ontrack = (event) => {
      video.srcObject = event.streams[0];
    };

    pc.addTransceiver("video", { direction: "recvonly" });

    async function startWebRTC() {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      await new Promise((resolve) => {
        if (pc.iceGatheringState === "complete") {
          resolve();
          return;
        }
        const onStateChange = () => {
          if (pc.iceGatheringState === "complete") {
            pc.removeEventListener("icegatheringstatechange", onStateChange);
            resolve();
          }
        };
        pc.addEventListener("icegatheringstatechange", onStateChange);
      });

      const response = await fetch("/offer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type
        })
      });

      const answer = await response.json();
      await pc.setRemoteDescription(answer);
    }

    syncLabels();
    markBoardDirty();
    startWebRTC().catch((err) => {
      console.error("WebRTC start failed:", err);
    });

    // -----------------------------------------------------------------------
    // Color palette + swipe state
    // -----------------------------------------------------------------------
    const paletteSwatches = document.getElementById("paletteSwatches");
    const swipeLabel = document.getElementById("swipeLabel");
    const hudCam  = document.getElementById("hudCam");
    const hudTip0 = document.getElementById("hudTip0");
    const hudTip1 = document.getElementById("hudTip1");
    const hudXyz  = document.getElementById("hudXyz");
    const hudHand  = document.getElementById("hudHand");
    const hudBrush = document.getElementById("hudBrush");
    const hudFps   = document.getElementById("hudFps");

    let palette = [];
    let activeColorIdx = 0;
    let swipeFadeTimer = null;

    function renderPalette() {
      paletteSwatches.innerHTML = "";
      palette.forEach((hex, i) => {
        const btn = document.createElement("button");
        btn.style.backgroundColor = hex;
        btn.style.width = "28px";
        btn.style.height = "28px";
        btn.style.borderRadius = "6px";
        btn.style.border = i === activeColorIdx
          ? "3px solid #fff"
          : "2px solid rgba(255,255,255,0.2)";
        btn.style.cursor = "pointer";
        btn.title = hex;
        btn.addEventListener("click", () => {
          fetch("/color", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idx: i }),
          });
          activeColorIdx = i;
          renderPalette();
        });
        paletteSwatches.appendChild(btn);
      });
    }

    function showSwipeLabel(label, color) {
      swipeLabel.textContent = label.replace("_", " ");
      swipeLabel.style.color = color;
      swipeLabel.style.opacity = "1";
      if (swipeFadeTimer) clearTimeout(swipeFadeTimer);
      swipeFadeTimer = setTimeout(() => {
        swipeLabel.style.opacity = "0";
      }, 800);
    }

    let lastSwipeLabel = "";

    function applyState(data) {
      if (data.palette) palette = data.palette;

      const needsRender = data.color_idx !== activeColorIdx || !paletteSwatches.children.length;
      if (data.color_idx !== undefined) activeColorIdx = data.color_idx;
      if (needsRender) renderPalette();

      const t = data.tracking || {};
      const fmt = (v) => v != null ? v.toFixed(1) : "—";
      const fmtPx = (arr) => arr ? `${arr[0]},${arr[1]}` : "—";
      const fmtXyz = (arr) => arr ? `${fmt(arr[0])} ${fmt(arr[1])} ${fmt(arr[2])}` : "—";
      hudCam.textContent  = `CAM  ${t.cam0 ?? "—"} / ${t.cam1 ?? "—"}`;
      hudTip0.textContent = `TIP0 ${fmtPx(t.tip0)}`;
      hudTip1.textContent = `TIP1 ${fmtPx(t.tip1)}`;
      hudXyz.textContent  = `XYZ  ${fmtXyz(t.pos3d)} in`;
      hudHand.textContent  = `HAND  ${t.gesture ?? "—"}`;
      hudBrush.textContent = `BRUSH ${t.brush_radius ?? "—"}px`;
      hudFps.textContent   = `FPS   ${t.fps ?? "—"}`;

      if (data.swipe_events && data.swipe_events.length) {
        const top = data.swipe_events[data.swipe_events.length - 1];
        const lbl = top.label;
        if (lbl !== lastSwipeLabel && top.frames > 20) {
          lastSwipeLabel = lbl;
          const hex = palette[top.color_idx] || "#fff";
          showSwipeLabel(lbl, hex);
        }
      } else {
        lastSwipeLabel = "";
      }
    }

    function connectStream() {
      const es = new EventSource("/stream");
      es.onmessage = (e) => {
        try { applyState(JSON.parse(e.data)); } catch (_) {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectStream, 1000);
      };
    }
    connectStream();
  </script>
</body>
</html>
