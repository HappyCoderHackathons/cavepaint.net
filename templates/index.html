<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cavepaint | Tailwind Starter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cave: "#0f172a",
            sky: "#22d3ee",
            ember: "#fb7185",
          },
          fontFamily: {
            display: ["Sora", "ui-sans-serif", "system-ui"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-cave text-slate-100">
  <main class="relative isolate overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(34,211,238,0.25),_transparent_40%),radial-gradient(circle_at_bottom_left,_rgba(251,113,133,0.25),_transparent_45%)]"></div>
    <section class="relative mx-auto flex min-h-screen w-full max-w-5xl items-center px-6 py-20 sm:px-10">
      <div class="w-full rounded-3xl border border-white/20 bg-white/10 p-8 backdrop-blur-xl sm:p-12">
        <p class="mb-4 inline-flex items-center rounded-full border border-sky/30 bg-sky/10 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-sky">
          Tailwind CSS Active
        </p>
        <h1 class="font-display text-4xl font-bold leading-tight sm:text-6xl">
          Cavepaint Flask Frontend
        </h1>
        <p class="mt-5 max-w-2xl text-lg text-slate-200">
          Tailwind is now wired into your template. You can style this page with utility classes immediately, no extra CSS file required.
        </p>
        <div class="mt-8 flex flex-wrap gap-3">
          <span class="rounded-lg bg-sky px-4 py-2 text-sm font-semibold text-cave">Flask + Tailwind</span>
          <span class="rounded-lg bg-ember px-4 py-2 text-sm font-semibold text-cave">Ready to build</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
