<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cave Replay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cave0: "#160f0a",
            cave1: "#2a1d13",
            clay: "#9e6b3d",
            chalk: "#f1e4cf",
            ember: "#e56a2e",
          },
          fontFamily: {
            display: ["Cinzel", "serif"],
            body: ["Manrope", "ui-sans-serif", "system-ui"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex h-screen flex-col overflow-hidden bg-cave0 font-body text-chalk">

  <div class="pointer-events-none fixed inset-0 opacity-20"
    style="background:radial-gradient(circle at 15% 20%, rgba(229,106,46,0.35), transparent 40%),
           radial-gradient(circle at 80% 10%, rgba(158,107,61,0.22), transparent 40%);"></div>
  <img src="/static/images/cave_wall.jpg" alt=""
    class="pointer-events-none fixed inset-0 z-0 h-full w-full object-cover opacity-[0.15]"
    draggable="false">

  <!-- Header bar -->
  <header class="relative z-20 flex shrink-0 items-center justify-between border-b border-stone-700/40 bg-cave1/70 px-5 py-3 backdrop-blur-sm">
    <div class="flex items-center gap-3">
      <a href="/gallery" class="text-xs font-semibold uppercase tracking-widest text-orange-100/55 transition hover:text-chalk">
        ← Gallery
      </a>
      <span class="text-stone-600">|</span>
      <span class="font-display text-sm text-orange-100 sm:text-base" id="sessionLabel">Loading…</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="rounded-full border border-ember/40 bg-cave0/50 px-2.5 py-0.5 text-[10px] font-semibold uppercase tracking-widest text-ember">
        Replay
      </span>
      <!-- Yaw + FOV inline -->
      <label class="hidden items-center gap-2 sm:flex">
        <span class="text-[10px] uppercase tracking-widest text-orange-100/50">FOV</span>
        <input id="fovRange" type="range" min="30" max="150" step="1" value="80" class="w-24 accent-ember">
        <span id="fovValue" class="w-7 text-xs font-semibold tabular-nums text-amber-200">80°</span>
      </label>
      <span id="yawReadout" class="hidden text-xs font-semibold tabular-nums text-amber-200 sm:block">0°</span>
    </div>
  </header>

  <!-- Whiteboard — fills the space between header and controls -->
  <div class="relative z-10 flex flex-1 min-h-0">
    <div
      id="boardSurface"
      class="relative flex-1 min-w-0 select-none overflow-hidden cursor-grab active:cursor-grabbing"
      style="background:#f5ede0;"
    >
      <img id="whiteboardImg" alt="Replay frame" class="h-full w-full object-fill" draggable="false">
      <div class="pointer-events-none absolute inset-x-0 top-0 h-6 bg-gradient-to-b from-black/10 to-transparent"></div>
      <div class="pointer-events-none absolute inset-x-0 bottom-0 h-6 bg-gradient-to-t from-black/10 to-transparent"></div>
      <!-- Cave frame overlay -->
      <div class="pointer-events-none absolute inset-y-0 left-1/2 z-10 w-full -translate-x-1/2">
        <img src="/static/images/cave.png" alt=""
          class="absolute left-1/2 top-1/2 h-[140%] w-[200%] -translate-x-1/2 -translate-y-1/2 object-fill opacity-20"
          style="filter:brightness(0.45) saturate(0.7);
                 -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 18%,black 82%,transparent 100%);
                 mask-image:linear-gradient(to bottom,transparent 0%,black 18%,black 82%,transparent 100%);"
          draggable="false">
      </div>
      <!-- Loading overlay -->
      <div id="loadingOverlay"
        class="absolute inset-0 z-20 flex items-center justify-center bg-cave0/60 backdrop-blur-sm">
        <div class="flex flex-col items-center gap-3">
          <div class="h-8 w-8 animate-spin rounded-full border-2 border-ember border-t-transparent"></div>
          <p class="text-xs uppercase tracking-widest text-orange-100/60">Loading session…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Playback controls -->
  <div class="relative z-20 shrink-0 border-t border-stone-700/40 bg-cave1/80 px-4 py-3 backdrop-blur-sm">
    <!-- Timeline scrubber -->
    <input
      id="scrubber"
      type="range" min="0" max="100" step="0.1" value="0"
      class="mb-3 w-full accent-ember"
    >
    <!-- Controls row -->
    <div class="flex flex-wrap items-center gap-3">
      <!-- Play / Pause -->
      <button id="playBtn"
        class="flex h-9 w-9 items-center justify-center rounded-full border border-ember/40
               bg-gradient-to-b from-[#8c6040] to-[#4a3020] text-base shadow-lg
               transition hover:brightness-110 active:scale-95">
        ▶
      </button>

      <!-- Time -->
      <span class="tabular-nums text-xs font-semibold text-amber-200">
        <span id="currentTime">0:00</span>
        <span class="text-orange-100/40"> / </span>
        <span id="totalTime">0:00</span>
      </span>

      <!-- Speed -->
      <div class="flex items-center gap-1 rounded-full border border-stone-700/50 bg-cave0/50 px-1 py-0.5">
        <span class="pl-1 text-[10px] uppercase tracking-wider text-orange-100/40">Speed</span>
        <button data-speed="1"   class="speed-btn active-speed rounded-full px-2 py-0.5 text-xs font-semibold">1×</button>
        <button data-speed="2"   class="speed-btn rounded-full px-2 py-0.5 text-xs font-semibold text-orange-100/50">2×</button>
        <button data-speed="4"   class="speed-btn rounded-full px-2 py-0.5 text-xs font-semibold text-orange-100/50">4×</button>
        <button data-speed="8"   class="speed-btn rounded-full px-2 py-0.5 text-xs font-semibold text-orange-100/50">8×</button>
      </div>

      <div class="ml-auto text-[11px] text-orange-100/35" id="strokeInfo"></div>
    </div>

    <div class="mt-3 rounded-lg border border-stone-700/50 bg-cave0/45 p-3">
      <div class="flex flex-wrap items-center gap-2">
        <input
          id="narrImageUrl"
          type="url"
          placeholder="Optional image URL (defaults to final drawing frame)"
          class="min-w-[260px] flex-1 rounded-md border border-stone-400/25 bg-cave0/65 px-3 py-2 text-xs text-chalk placeholder:text-orange-100/35 focus:outline-none"
        >
        <button
          id="narrateBtn"
          class="rounded-full border border-ember/40 bg-gradient-to-b from-[#8c6040] to-[#4a3020] px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.12em] text-amber-100 transition hover:brightness-110"
        >
          Narrate Frame
        </button>
        <button
          id="stopNarrateBtn"
          class="rounded-full border border-stone-200/20 bg-gradient-to-b from-[#656565] to-[#3b3b3b] px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.12em] text-stone-100 transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-45"
          disabled
        >
          Stop
        </button>
      </div>

      <textarea
        id="narrPrompt"
        rows="2"
        class="mt-2 w-full resize-y rounded-md border border-stone-400/25 bg-cave0/65 px-3 py-2 text-xs text-chalk placeholder:text-orange-100/35 focus:outline-none"
        placeholder="Optional prompt (e.g., 'Tell this like an ancient myth unfolding scene by scene.')"
      ></textarea>

      <p id="narrStatus" class="mt-2 text-[11px] text-orange-100/65">
        Narrator idle.
      </p>
      <pre
        id="narrOutput"
        class="mt-2 max-h-40 overflow-y-auto whitespace-pre-wrap rounded-md border border-stone-600/45 bg-cave0/70 p-3 text-xs leading-relaxed text-orange-50/95"
      ></pre>
    </div>
  </div>

  <script>
    // Session ID is embedded in the URL: /replay/<session_id>
    const sessionId = decodeURIComponent(location.pathname.split("/replay/")[1] || "");

    const boardSurface   = document.getElementById("boardSurface");
    const whiteboardImg  = document.getElementById("whiteboardImg");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const playBtn        = document.getElementById("playBtn");
    const scrubber       = document.getElementById("scrubber");
    const currentTimeEl  = document.getElementById("currentTime");
    const totalTimeEl    = document.getElementById("totalTime");
    const sessionLabel   = document.getElementById("sessionLabel");
    const strokeInfo     = document.getElementById("strokeInfo");
    const fovRange       = document.getElementById("fovRange");
    const fovValue       = document.getElementById("fovValue");
    const yawReadout     = document.getElementById("yawReadout");
    const narrImageUrl   = document.getElementById("narrImageUrl");
    const narrPrompt     = document.getElementById("narrPrompt");
    const narrateBtn     = document.getElementById("narrateBtn");
    const stopNarrateBtn = document.getElementById("stopNarrateBtn");
    const narrStatus     = document.getElementById("narrStatus");
    const narrOutput     = document.getElementById("narrOutput");

    const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
    const wrap360 = v => { const w = v % 360; return w < 0 ? w + 360 : w; };
    const fmt = s => {
      s = Math.max(0, s);
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${String(sec).padStart(2, "0")}`;
    };

    let duration   = 0;
    let t          = 0;
    let speed      = 1.0;
    let playing    = false;
    let yaw        = 0.0;
    let fov        = 80.0;
    let boardBusy  = false;
    let boardDirty = true;
    let lastObjUrl = null;
    let rafId      = null;
    let lastRafTs  = null;
    let scrubbing  = false;
    let narrController = null;
    let narrSseBuffer = "";

    // --- frame fetching -------------------------------------------------------

    async function fetchFrame() {
      if (boardBusy) { boardDirty = true; return; }
      if (!boardDirty) return;
      boardBusy = true;
      boardDirty = false;
      try {
        const rect = boardSurface.getBoundingClientRect();
        const w = Math.max(320, Math.round(rect.width));
        const h = Math.max(120, Math.round(rect.height));
        const url = `/api/sessions/${encodeURIComponent(sessionId)}/frame`
          + `?t=${t.toFixed(2)}&yaw=${wrap360(yaw).toFixed(2)}&fov=${fov.toFixed(1)}&w=${w}&h=${h}`;
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) return;
        const blob = await resp.blob();
        const objUrl = URL.createObjectURL(blob);
        whiteboardImg.src = objUrl;
        if (lastObjUrl) URL.revokeObjectURL(lastObjUrl);
        lastObjUrl = objUrl;
        loadingOverlay.style.display = "none";
      } catch (_) {
        // keep going
      } finally {
        boardBusy = false;
        if (boardDirty) fetchFrame();
      }
    }

    // --- playback RAF ---------------------------------------------------------

    function rafLoop(ts) {
      if (!playing) { lastRafTs = null; return; }
      if (lastRafTs !== null) {
        t = Math.min(duration, t + (ts - lastRafTs) / 1000 * speed);
        syncUI();
        boardDirty = true;
        fetchFrame();
        if (t >= duration) { pause(); return; }
      }
      lastRafTs = ts;
      rafId = requestAnimationFrame(rafLoop);
    }

    function play() {
      if (t >= duration) t = 0;
      playing = true;
      playBtn.textContent = "⏸";
      lastRafTs = null;
      rafId = requestAnimationFrame(rafLoop);
    }

    function pause() {
      playing = false;
      playBtn.textContent = "▶";
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    playBtn.addEventListener("click", () => playing ? pause() : play());

    // --- scrubber -------------------------------------------------------------

    scrubber.addEventListener("mousedown", () => { scrubbing = true; pause(); });
    scrubber.addEventListener("touchstart", () => { scrubbing = true; pause(); }, { passive: true });
    scrubber.addEventListener("input", () => {
      t = (parseFloat(scrubber.value) / 100) * duration;
      syncUI();
      boardDirty = true;
      fetchFrame();
    });
    scrubber.addEventListener("mouseup",   () => { scrubbing = false; });
    scrubber.addEventListener("touchend",  () => { scrubbing = false; });

    // --- speed buttons --------------------------------------------------------

    document.querySelectorAll(".speed-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        speed = parseFloat(btn.dataset.speed);
        document.querySelectorAll(".speed-btn").forEach(b => {
          b.classList.toggle("active-speed", b === btn);
          b.classList.toggle("text-orange-100/50", b !== btn);
          b.classList.remove("text-chalk");
        });
        btn.classList.add("text-chalk");
      });
    });

    // Add active style
    const style = document.createElement("style");
    style.textContent = `.active-speed { background: #e56a2e33; color: #e56a2e; }`;
    document.head.appendChild(style);

    // --- yaw drag -------------------------------------------------------------

    let dragging = false, dragStartX = 0, dragStartYaw = 0;
    boardSurface.addEventListener("pointerdown", e => {
      dragging = true; dragStartX = e.clientX; dragStartYaw = yaw;
      boardSurface.setPointerCapture(e.pointerId);
    });
    boardSurface.addEventListener("pointermove", e => {
      if (!dragging) return;
      yaw = wrap360(dragStartYaw + (e.clientX - dragStartX) * 0.22);
      syncUI(); boardDirty = true; fetchFrame();
    });
    function stopDrag(e) {
      if (dragging) {
        dragging = false;
        if (typeof e.pointerId === "number") boardSurface.releasePointerCapture(e.pointerId);
      }
    }
    boardSurface.addEventListener("pointerup", stopDrag);
    boardSurface.addEventListener("pointercancel", stopDrag);

    // Scroll to zoom FOV
    boardSurface.addEventListener("wheel", e => {
      e.preventDefault();
      fov = clamp(fov + e.deltaY * 0.05, 30, 150);
      syncUI(); boardDirty = true; fetchFrame();
    }, { passive: false });

    fovRange.addEventListener("input", () => {
      fov = clamp(Number(fovRange.value) || 80, 30, 150);
      syncUI(); boardDirty = true; fetchFrame();
    });

    window.addEventListener("resize", () => { boardDirty = true; fetchFrame(); });

    // --- sync UI --------------------------------------------------------------

    function syncUI() {
      if (!scrubbing) scrubber.value = duration > 0 ? (t / duration * 100) : 0;
      currentTimeEl.textContent = fmt(t);
      fovRange.value = Math.round(fov);
      fovValue.textContent = Math.round(fov) + "°";
      yawReadout.textContent = wrap360(yaw).toFixed(1) + "°";
    }

    function buildNarrationFrameUrl() {
      const rect = boardSurface.getBoundingClientRect();
      const w = Math.max(320, Math.round(rect.width));
      const h = Math.max(120, Math.round(rect.height));
      // Narration should describe the completed drawing, not the current playback frame.
      const finalT = duration > 0 ? duration : t;
      const rel = `/api/sessions/${encodeURIComponent(sessionId)}/frame`
        + `?t=${finalT.toFixed(2)}&yaw=${wrap360(yaw).toFixed(2)}&fov=${fov.toFixed(1)}&w=${w}&h=${h}&ts=${Date.now()}`;
      return `${location.origin}${rel}`;
    }

    function setNarrStatus(msg, isError = false) {
      narrStatus.textContent = msg;
      narrStatus.className = isError
        ? "mt-2 text-[11px] text-red-300"
        : "mt-2 text-[11px] text-orange-100/65";
    }

    function appendNarrText(text) {
      if (!text) return;
      narrOutput.textContent += text;
      narrOutput.scrollTop = narrOutput.scrollHeight;
    }

    function consumeNarrBlock(block) {
      if (!block.trim()) return;
      let eventType = "message";
      const dataLines = [];
      for (const line of block.split(/\r?\n/)) {
        if (line.startsWith("event:")) eventType = line.slice(6).trim();
        if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
      }
      const dataRaw = dataLines.join("");
      if (!dataRaw) return;

      let payload;
      try {
        payload = JSON.parse(dataRaw);
      } catch (_) {
        payload = { text: dataRaw };
      }

      if (eventType === "delta") {
        appendNarrText(payload.text || "");
      } else if (eventType === "done") {
        setNarrStatus(`Narration complete (${payload.model || "model"}).`);
      } else if (eventType === "error") {
        const detail = payload.detail ? ` (${payload.detail})` : "";
        const hint = payload.hint ? ` Hint: ${payload.hint}` : "";
        setNarrStatus(`${payload.error || "Narration failed"}${detail}${hint}`, true);
      }
    }

    function stopNarration() {
      if (!narrController) return;
      narrController.abort();
      narrController = null;
      setNarrStatus("Narration stopped.");
      narrateBtn.disabled = false;
      stopNarrateBtn.disabled = true;
    }

    async function startNarration() {
      if (!sessionId) return;
      if (narrController) stopNarration();

      const imageUrl = (narrImageUrl.value || "").trim() || buildNarrationFrameUrl();
      const prompt = (narrPrompt.value || "").trim();

      const controller = new AbortController();
      narrController = controller;
      narrSseBuffer = "";
      narrOutput.textContent = "";
      setNarrStatus("Connecting to narrator API…");
      narrateBtn.disabled = true;
      stopNarrateBtn.disabled = false;

      try {
        const resp = await fetch("/api/replay/narrate_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                image_url: imageUrl,
                prompt,
              }),
          signal: controller.signal,
        });

        if (!resp.ok || !resp.body) {
          const msg = await resp.text();
          throw new Error(msg || `HTTP ${resp.status}`);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        setNarrStatus("Narration streaming…");

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          narrSseBuffer += decoder.decode(value, { stream: true }).replace(/\r\n/g, "\n");
          let boundary = narrSseBuffer.indexOf("\n\n");
          while (boundary !== -1) {
            const block = narrSseBuffer.slice(0, boundary);
            narrSseBuffer = narrSseBuffer.slice(boundary + 2);
            consumeNarrBlock(block);
            boundary = narrSseBuffer.indexOf("\n\n");
          }
        }

        if (narrSseBuffer.trim()) {
          consumeNarrBlock(narrSseBuffer);
          narrSseBuffer = "";
        }
      } catch (err) {
        if (controller.signal.aborted) {
          // stopNarration already set status
        } else {
          setNarrStatus(`Narration error: ${err.message || err}`, true);
        }
      } finally {
        if (narrController === controller) narrController = null;
        narrateBtn.disabled = false;
        stopNarrateBtn.disabled = true;
      }
    }

    narrateBtn.addEventListener("click", startNarration);
    stopNarrateBtn.addEventListener("click", stopNarration);
    window.addEventListener("beforeunload", stopNarration);

    // --- init -----------------------------------------------------------------

    async function init() {
      if (!sessionId) {
        sessionLabel.textContent = "No session";
        return;
      }

      try {
        const resp = await fetch(`/api/sessions/${encodeURIComponent(sessionId)}`);
        if (!resp.ok) throw new Error("Not found");
        const info = await resp.json();

        duration = info.duration_s || 0;
        totalTimeEl.textContent = fmt(duration);
        strokeInfo.textContent = `${(info.stroke_count || 0).toLocaleString()} points recorded`;

        const label = info.started_at
          ? new Date(info.started_at).toLocaleString(undefined, {
              month: "short", day: "numeric", year: "numeric",
              hour: "2-digit", minute: "2-digit",
            })
          : "Session";
        sessionLabel.textContent = label;

      } catch (_) {
        sessionLabel.textContent = "Session not found";
        loadingOverlay.style.display = "none";
        return;
      }

      syncUI();
      boardDirty = true;
      await fetchFrame();
      play();
    }

    init();
  </script>
</body>
</html>
